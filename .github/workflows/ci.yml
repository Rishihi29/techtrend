name: CI

on:
  push: { branches: [main] }
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }

      - name: Install
        run: pip install -e ".[api,dev]"

      - name: Lint (ruff)
        run: |
          ruff check src api tests scripts
          ruff format --check src api tests scripts

      - name: Type check (mypy)
        run: mypy src

      - name: Unit tests
        run: pytest tests/unit --cov=src/techtrend --cov-report=term-missing

      - name: End-to-end pipeline (lake -> dbt -> warehouse)
        run: python scripts/seed_demo.py

      - name: API integration tests
        run: pytest tests/api

      - name: dbt artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with: { name: dbt-logs, path: dbt/techtrend_dw/logs, if-no-files-found: ignore }

  docker-build:
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f docker/api/Dockerfile -t techtrend-api:ci .
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@master
        with: { image-ref: "techtrend-api:ci", severity: "CRITICAL,HIGH", exit-code: "0" }
